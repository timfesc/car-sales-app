        'Zeekr': ['001', '007', '009', 'X', '7X'],

        'КАМАЗ': ['54901', '65115', '43118'],

      const colors = ['Белый', 'Чёрный', 'Серебристый', 'Серый', 'Красный', 'Синий', 'Зелёный', 'Золотой', 'Бежевый', 'Коричневый', 'Оранжевый', 'Жёлтый'];
      const years = Array.from({ length: 30 }, (_, i) => 2026 - i);

      const handleChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');

        try {
          const response = await fetch('/api/send-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              customerName: formData.customerName,
              customerPhone: formData.customerPhone,
              carBrand: formData.brand,
              carModel: formData.model,
              carYear: formData.year,
              carColor: formData.color,
              submissionTime: new Date().toLocaleString('ru-RU')
            })
          });

          if (!response.ok) throw new Error('Failed');
          
          setSubmitted(true);
          setTimeout(() => {
            setFormData({ brand: '', model: '', year: 2026, color: '', customerName: '', customerPhone: '' });
            setSubmitted(false);
          }, 3000);
        } catch (err) {
          setError('Ошибка при отправке. Попробуйте еще раз.');
        }
        setLoading(false);
      };

      if (submitted) {
        return (
          <div className="min-h-screen bg-slate-950 flex items-center justify-center p-4">
            <div className="text-center">
              <h1 className="text-3xl font-semibold text-slate-100 mb-2">✓ Заявка отправлена</h1>

              <p className="text-slate-200 font-medium text-lg mb-6">{formData.year} {formData.brand} {formData.model}</p>

      return (

          </header>

              {error && <div className="mb-6 p-4 bg-red-900/20 border border-red-800 rounded-lg text-red-400 text-sm">{error}</div>}

                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-2">Марка</label>
                    <select name="brand" value={formData.brand} onChange={handleChange} required className="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-slate-100 focus:outline-none focus:border-slate-600">

                    </select>
                  </div>

                    <label className="block text-sm font-medium text-slate-400 mb-2">Модель</label>
                    <select name="model" value={formData.model} onChange={handleChange} required disabled={!formData.brand} className="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-slate-100 focus:outline-none focus:border-slate-600 disabled:bg-slate-800">
                      <option value="">{formData.brand ? 'Выберите модель...' : 'Сначала выберите марку...'}</option>
                      {formData.brand && modelsByBrand[formData.brand]?.map(m => <option key={m} value={m}>{m}</option>)}
                    </select>
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-2">Год</label>
                    <select name="year" value={formData.year} onChange={handleChange} required className="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-slate-100">
                      {years.map(y => <option key={y} value={y}>{y}</option>)}
                    </select>
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-2">Цвет</label>
                    <select name="color" value={formData.color} onChange={handleChange} required className="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-slate-100">
                      <option value="">Выберите цвет...</option>
                      {colors.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                </div>

                <div className="border-t border-slate-800 pt-6">
                  <h3 className="text-sm font-semibold text-slate-300 mb-6">Ваши контактные данные</h3>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <input type="text" name="customerName" value={formData.customerName} onChange={handleChange} required placeholder="Имя" className="px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-slate-100 placeholder-slate-600 focus:outline-none focus:border-slate-600" />
                    <input type="tel" name="customerPhone" value={formData.customerPhone} onChange={handleChange} required placeholder="Телефон" className="px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-slate-100 placeholder-slate-600 focus:outline-none focus:border-slate-600" />
                  </div>
                </div>

                <button type="submit" disabled={loading} className="w-full mt-8 px-8 py-3 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 disabled:opacity-50 font-medium">
                  {loading ? 'Отправка...' : '✓ Отправить заявку'}
                </button>
              </form>
            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(<App />);
  </script>
</body>
</html>
